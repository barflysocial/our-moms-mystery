services:
  - type: web
    name: reunion-at-our-moms
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: APP_SECRET
        generateValue: true
      - key: HOST_PIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: reunion-mystery-db
          property: connectionString

databases:
  - name: reunion-mystery-db
    plan: free
    databaseName: reunion_mystery
    user: reunion_mystery_user
